<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Salesforce Developer portfolio for Richard Santiago — Apex, LWC, OmniStudio, integrations, and CI/CD.">
<title>Richard Santiago | Salesforce Developer Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sf-blue: #00A1E0;
  --sf-navy: #032D60;
  --sf-teal: #1D9E75;
  --sf-gold: #BA7517;
  --bg: #ffffff;
  --bg2: #f8f9fb;
  --text: #0a0a0a;
  --text2: #444;
  --text3: #888;
  --border: #e2e6ea;
  --display: 'Syne', sans-serif;
  --mono: 'DM Mono', monospace;
}
html { scroll-behavior: smooth; }
body { font-family: var(--mono); font-size: 14px; color: var(--text); background: var(--bg); line-height: 1.6; }
nav { position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 1rem 2.5rem; background: rgba(255,255,255,0.95); border-bottom: 1px solid var(--border); backdrop-filter: blur(8px); }
.nav-brand { font-family: var(--display); font-weight: 800; font-size: 18px; color: var(--sf-navy); text-decoration: none; }
.nav-brand span { color: var(--sf-blue); }
.nav-links { display: flex; gap: 1.5rem; list-style: none; align-items: center; }
.nav-links a { color: var(--text2); text-decoration: none; font-size: 13px; letter-spacing: 0.03em; transition: color 0.2s; }
.nav-links a:hover { color: var(--sf-blue); }
.nav-links .cta { background: var(--sf-blue); color: white !important; padding: 6px 18px; font-weight: 500; }
.hero { padding: 5rem 2.5rem 4rem; background: linear-gradient(135deg, #f0f8ff 0%, #e8f4fb 40%, #f0faf6 100%); border-bottom: 1px solid var(--border); }
.hero-inner { max-width: 860px; }
.hero-eyebrow { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--sf-blue); margin-bottom: 1.25rem; }
.hero-eyebrow::before { content: ''; width: 20px; height: 1.5px; background: var(--sf-blue); display: block; }
h1 { font-family: var(--display); font-size: clamp(40px, 6vw, 68px); font-weight: 800; line-height: 1.05; color: var(--sf-navy); margin-bottom: 0.5rem; }
h1 em { font-style: normal; color: var(--sf-blue); }
.hero-role { font-family: var(--display); font-size: clamp(16px, 2vw, 22px); font-weight: 500; color: var(--text2); margin-bottom: 1.5rem; }
